name: Publish Package

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - bun.lock
      - src/**
      - tsconfig.json
      - tsconfig.build.json
      - README.md
      - .github/workflows/publish-package.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-package
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node (npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Read package metadata
        id: pkg
        run: |
          set -euo pipefail
          PACKAGE_NAME=$(node -p "require('./package.json').name || ''")
          PACKAGE_VERSION=$(node -p "require('./package.json').version || ''")

          if [ -z "$PACKAGE_NAME" ] || [ -z "$PACKAGE_VERSION" ]; then
            echo "package.json must include name and version" >&2
            exit 1
          fi

          echo "name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if version already exists on npm
        id: npm-check
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version already published on npm. Skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: ${{ steps.npm-check.outputs.exists != 'true' }}
        run: bun install --frozen-lockfile

      - name: Verify types
        if: ${{ steps.npm-check.outputs.exists != 'true' }}
        run: bun run typecheck

      - name: Run tests
        if: ${{ steps.npm-check.outputs.exists != 'true' }}
        run: bun run test

      - name: Build package
        if: ${{ steps.npm-check.outputs.exists != 'true' }}
        run: bun run build

      - name: Publish to npm
        if: ${{ steps.npm-check.outputs.exists != 'true' }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
